<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #f4efe7;
            --panel: rgba(255, 251, 245, 0.92);
            --nav: rgba(250, 245, 238, 0.9);
            --border: rgba(57, 43, 23, 0.1);
            --text: #1e1a16;
            --muted: #72685d;
            --danger-bg: rgba(231, 111, 81, 0.12);
            --shadow: rgba(80, 59, 25, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "PingFang SC", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(42, 157, 143, 0.14), transparent 28%),
                radial-gradient(circle at top right, rgba(231, 111, 81, 0.14), transparent 32%),
                linear-gradient(135deg, #f7f2ea 0%, #efe7dc 100%);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(14px);
            background: var(--nav);
            border-bottom: 1px solid var(--border);
        }

        .topbar-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .brand-mark {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            background: linear-gradient(135deg, #2a9d8f, #e76f51);
            box-shadow: 0 0 0 6px rgba(180, 90, 50, 0.08);
        }

        .nav-links {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 9px 14px;
            border-radius: 999px;
            color: var(--muted);
            border: 1px solid transparent;
        }

        .nav-link.active {
            color: var(--text);
            background: rgba(255, 255, 255, 0.7);
            border-color: var(--border);
        }

        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 28px 20px 48px;
        }

        .hero {
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
        }

        .hero p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        input[type="date"], button {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
            background: rgba(255, 255, 255, 0.8);
        }

        button {
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, minmax(0, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 14px 36px var(--shadow);
        }

        .metric { grid-column: span 3; }
        .full { grid-column: 1 / -1; }
        .span-5 { grid-column: span 5; }
        .span-7 { grid-column: span 7; }

        .section-title {
            margin: 0 0 14px;
            font-size: 18px;
        }

        .metric-label {
            color: var(--muted);
            font-size: 13px;
        }

        .metric-value {
            margin-top: 8px;
            font-size: 30px;
            font-weight: 700;
        }

        .metric-sub {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
        }

        .chart {
            width: 100%;
            height: 340px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(57, 43, 23, 0.08);
            font-size: 13px;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-weight: 600;
        }

        tr.deviated {
            background: var(--danger-bg);
        }

        .mono {
            font-family: Consolas, "SFMono-Regular", monospace;
        }

        @media (max-width: 960px) {
            .metric, .full, .span-5, .span-7 {
                grid-column: 1 / -1;
            }

            .topbar-inner,
            .page {
                padding-left: 14px;
                padding-right: 14px;
            }
        }

        @media (max-width: 640px) {
            .topbar-inner {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<header class="topbar">
    <div class="topbar-inner">
        <a class="brand" href="/">
            <span class="brand-mark"></span>
            <span>ScreenMonitor</span>
        </a>
        <nav class="nav-links">
            <a class="nav-link" href="/">今日统计看板</a>
            <a class="nav-link active" href="/history">历史记录</a>
        </nav>
    </div>
</header>

<div class="page">
    <section class="hero">
        <h1>历史回顾</h1>
        <p>按日期查看当天概览、分类占比、小时图和 session 列表。</p>
        <div class="toolbar">
            <input id="dateInput" type="date">
            <button id="loadButton" type="button">查看当天</button>
        </div>
    </section>

    <section class="grid">
        <article class="card metric">
            <div class="metric-label">总时长</div>
            <div class="metric-value" id="totalDuration">0s</div>
            <div class="metric-sub">由当天全部 session 汇总</div>
        </article>
        <article class="card metric">
            <div class="metric-label">专注学习时长</div>
            <div class="metric-value" id="studyDuration">0s</div>
            <div class="metric-sub">被判定为学习相关</div>
        </article>
        <article class="card metric">
            <div class="metric-label">偏离目标时长</div>
            <div class="metric-value" id="deviatedDuration">0s</div>
            <div class="metric-sub">被判定为偏离目标</div>
        </article>
        <article class="card metric">
            <div class="metric-label">当日记录数</div>
            <div class="metric-value" id="totalSessions">0</div>
            <div class="metric-sub">当天开始的行为段数量</div>
        </article>

        <article class="card span-7">
            <h2 class="section-title">按小时统计柱状图</h2>
            <div id="historyHourlyChart" class="chart"></div>
        </article>

        <article class="card span-5">
            <h2 class="section-title">分类占比图</h2>
            <div id="historyCategoryChart" class="chart"></div>
        </article>

        <article class="card full">
            <h2 class="section-title">当天 Session 列表</h2>
            <table>
                <thead>
                <tr>
                    <th>开始时间</th>
                    <th>结束时间</th>
                    <th>时长</th>
                    <th>App</th>
                    <th>Category</th>
                    <th>AI Summary</th>
                    <th>模型</th>
                </tr>
                </thead>
                <tbody id="historyTable">
                <tr>
                    <td colspan="7">加载中...</td>
                </tr>
                </tbody>
            </table>
        </article>
    </section>
</div>

<script>
    const historyChart = echarts.init(document.getElementById("historyHourlyChart"));
    const categoryChart = echarts.init(document.getElementById("historyCategoryChart"));

    function formatSeconds(seconds) {
        const value = Number(seconds || 0);
        if (value < 60) return `${value}s`;
        const hours = Math.floor(value / 3600);
        const minutes = Math.floor((value % 3600) / 60);
        if (hours > 0) return `${hours}h ${minutes}m`;
        return `${minutes}m`;
    }

    function formatBusinessDuration(seconds) {
        const value = Math.max(0, Number(seconds || 0));
        const hours = Math.floor(value / 3600);
        const minutes = Math.floor((value % 3600) / 60);
        const remainSeconds = value % 60;

        if (hours > 0) return `${hours} 小时 ${minutes} 分`;
        if (minutes > 0) return `${minutes} 分 ${remainSeconds} 秒`;
        return `${remainSeconds} 秒`;
    }

    function escapeHtml(text) {
        return String(text || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }

    function formatDateTime(value) {
        if (!value) return "";
        return String(value).replace("T", " ").split(".")[0];
    }

    function getSelectedDate() {
        const params = new URLSearchParams(window.location.search);
        return params.get("date") || new Date().toISOString().slice(0, 10);
    }

    function renderHourly(items) {
        historyChart.setOption({
            animationDuration: 400,
            tooltip: {
                trigger: "axis",
                formatter: (params) => {
                    const lines = [`${params[0]?.axisValueLabel || ""}`];
                    params.forEach((item) => {
                        const rawSeconds = Math.round(Number(item.data || 0) * 60);
                        lines.push(`${item.marker}${item.seriesName}: ${formatBusinessDuration(rawSeconds)}`);
                    });
                    return lines.join("<br>");
                }
            },
            legend: { top: 6 },
            grid: { left: 24, right: 24, top: 52, bottom: 24, containLabel: true },
            xAxis: {
                type: "category",
                data: items.map((item) => item.hour_label)
            },
            yAxis: {
                type: "value",
                name: "分钟"
            },
            series: [
                {
                    name: "学习时长",
                    type: "bar",
                    data: items.map((item) => Number(item.study_seconds || 0) / 60),
                    itemStyle: { color: "#2a9d8f", borderRadius: [8, 8, 0, 0] }
                },
                {
                    name: "偏离时长",
                    type: "bar",
                    data: items.map((item) => Number(item.deviated_seconds || 0) / 60),
                    itemStyle: { color: "#e76f51", borderRadius: [8, 8, 0, 0] }
                }
            ]
        });
    }

    function renderCategory(summary) {
        const data = [
            { value: Number(summary.study_seconds || 0), name: "学习" },
            { value: Number(summary.entertainment_seconds || 0), name: "娱乐" },
            { value: Number(summary.idle_seconds || 0), name: "离开/静止" },
            { value: Number(summary.unknown_seconds || 0), name: "未知" }
        ];

        categoryChart.setOption({
            animationDuration: 500,
            tooltip: {
                trigger: "item",
                formatter: (params) => `${params.name}: ${formatSeconds(params.value)}`
            },
            legend: { bottom: 0 },
            series: [
                {
                    type: "pie",
                    radius: ["42%", "72%"],
                    center: ["50%", "44%"],
                    label: {
                        formatter: ({ name, percent, value }) => value ? `${name}\n${percent}%` : ""
                    },
                    data,
                    itemStyle: {
                        borderColor: "#fffaf3",
                        borderWidth: 3
                    },
                    color: ["#2a9d8f", "#f4a261", "#9aa0a6", "#8d99ae"]
                }
            ]
        });
    }

    function renderSessions(items) {
        const tbody = document.getElementById("historyTable");
        if (!items.length) {
            tbody.innerHTML = `<tr><td colspan="7">当天暂无记录</td></tr>`;
            return;
        }

        tbody.innerHTML = items.map((item) => `
            <tr class="${Number(item.is_deviated) === 1 ? "deviated" : ""}">
                <td class="mono">${escapeHtml(formatDateTime(item.start_time))}</td>
                <td class="mono">${escapeHtml(formatDateTime(item.end_time))}</td>
                <td>${formatSeconds(item.duration_seconds)}</td>
                <td>${escapeHtml(item.app_name || "")}</td>
                <td>${escapeHtml(item.category || "unknown")}</td>
                <td>${escapeHtml(item.ai_summary || "")}</td>
                <td>${escapeHtml(item.model_used || "")}</td>
            </tr>
        `).join("");
    }

    async function loadHistory(dateValue) {
        const response = await fetch(`/api/dashboard/history?date=${encodeURIComponent(dateValue)}`);
        const payload = await response.json();

        document.getElementById("dateInput").value = payload.date;
        document.getElementById("totalDuration").textContent = formatSeconds(payload.summary.total_seconds || 0);
        document.getElementById("studyDuration").textContent = formatSeconds(payload.summary.study_seconds || 0);
        document.getElementById("deviatedDuration").textContent = formatSeconds(payload.summary.deviated_seconds || 0);
        document.getElementById("totalSessions").textContent = payload.summary.session_count || 0;

        renderHourly(payload.hourly || []);
        renderCategory(payload.summary || {});
        renderSessions(payload.sessions || []);

        const params = new URLSearchParams(window.location.search);
        params.set("date", payload.date);
        history.replaceState(null, "", `${window.location.pathname}?${params.toString()}`);
    }

    document.getElementById("loadButton").addEventListener("click", () => {
        loadHistory(document.getElementById("dateInput").value);
    });

    loadHistory(getSelectedDate());
    window.addEventListener("resize", () => {
        historyChart.resize();
        categoryChart.resize();
    });
</script>
</body>
</html>
