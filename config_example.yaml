capture:
  interval_seconds: 5
  scale_percent: 50
  target_screen: main
  format: jpg
  quality: 70
triggers:
  min_ai_interval_seconds: 3
  idle_timeout_seconds: 60
  static_skip_count: 3
  trigger_on_window_switch: true
  static_screen_threshold: 2.0
  inherit_previous_state: true
  static_reading_grace_seconds: 120
  no_input_suspect_seconds: 180
  static_recheck_ai_seconds: 300
  away_from_keyboard_seconds: 600
ai_models:
  primary: gemini-2.5-flash
  gemini_enabled: true
  qwen_fallback_model: qwen-vl-plus
  qwen_enabled: true
  fallback: kimi-k2.5
  kimi_enabled: true
  ai_provider_order:
  - gemini
  - jeniya
  - qwen
  - kimi
  timeout_seconds: 20
  max_retries: 2
  low_confidence_threshold: 0.7
  output_length: 1-2 sentences
ai_providers:
  gemini:
    type: gemini
    enabled: true
    model: gemini-2.5-flash
    api_key_ref: gemini
  qwen:
    type: openai_compatible
    enabled: true
    model: qwen-vl-plus
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api_key_ref: qwen
    api_key_env: DASHSCOPE_API_KEY
  kimi:
    type: openai_compatible
    enabled: true
    model: kimi-k2.5
    base_url: https://api.moonshot.cn/v1
    api_key_ref: kimi
    temperature: 1
  aitools:
    type: openai_compatible
    enabled: false
    model: qwen/qwen2.5-vl-32b
    base_url: https://platform.aitools.cfd/api/v1
    api_key_ref: aitools
    input_mode: vision
  jeniya:
    type: gemini_rest
    enabled: false
    model: gemini-2.5-pro
    base_url: https://jeniya.top
    api_key_ref: jeniya
storage:
  log_format: jsonl
  screenshot_retention_seconds: 60
  log_retention_days: 30
  anomaly_image_retention_days: 7
  save_raw_model_output: false
notifications:
  hourly_summary_interval_hours: 1
  distraction_threshold_minutes: 3
  min_session_length_minutes: 1
  daily_summary_time: '22:00'
system:
  run_on_startup: true
  auto_start_monitoring: true
  show_tray_icon: true
  silent_mode: true
  cpu_limit_strategy: low
  cache_tasks_offline: true
  retry_on_reconnect: true
context:
  current_goal: 完成 Python 自动化工具开发
api_keys:
  gemini: xx
  qwen: ''
  kimi: sk-xx
  aitools: ''
  jeniya: ''
  feishu_webhook: 在这里填入你的_飞书机器人_Webhook_URL
